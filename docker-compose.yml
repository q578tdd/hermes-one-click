services:
  # ============================================================
  # Redis — 会话缓存与状态管理
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # 可选：使用密码
    # command: redis-server --requirepass ${REDIS_PASSWORD:-}

  # ============================================================
  # Hermes Agent — AI 智能助手主服务
  # ============================================================
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    ports:
      - "${HERMES_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # 持久化配置和数据
      - hermes_config:/root/.hermes
      - hermes_data:/root/.hermes_data
      # 可选：挂载宿主机目录，方便交互文件
      # - ./workspace:/workspace
    environment:
      - HERMES_CONFIG_DIR=/root/.hermes
      - REDIS_URL=redis://redis:6379/0
      - TZ=${TZ:-UTC}
    env_file:
      - .env

  # ============================================================
  # PostgreSQL（可选）— 数据持久化
  # 如需使用，取消注释并配置 .env 中的 DATABASE_URL
  # ============================================================
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: hermes-postgres
  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-hermes}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes_secret}
  #     POSTGRES_DB: ${POSTGRES_DB:-hermes}
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  redis_data:
  hermes_config:
  hermes_data:
  # postgres_data:
